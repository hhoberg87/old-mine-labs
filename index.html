<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Old Mine Labs</title>
  <meta name="description" content="Old Mine Labs is an app studio. We build apps." />

  <!-- Open Graph / social -->
  <meta property="og:title" content="Old Mine Labs" />
  <meta property="og:description" content="An app studio. We build apps." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://old-mine-labs.com" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/Icon.png" />
  <link rel="apple-touch-icon" href="assets/Icon.png" />
  <meta property="og:image" content="assets/Icon.png" />

  <style>
    :root {
      --bg: #0a0a0a;
      --gold-light: #EBCB84;
      --gold: #D6A64A;
      --gold-dark: #B07C28;
      --cream: #F4EEDC;
      --muted: #9a927f;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: #000;
      color: var(--cream);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6vh 24px;
      -webkit-font-smoothing: antialiased;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
      max-width: 560px;
      animation: rise 900ms cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: clamp(280px, 72vw, 560px);
      height: auto;
      display: block;
    }

    .tagline {
      color: var(--muted);
      font-size: clamp(1rem, 2.6vw, 1.15rem);
      line-height: 1.7;
      max-width: 42ch;
      font-weight: 400;
      margin-top: -25px; /* pull text closer to the logo */
    }

    .tagline strong {
      color: var(--gold);
      font-weight: 600;
    }

    .contact {
      margin-top: 4px;
    }

    .contact a {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(214,166,74,0.35);
      padding-bottom: 2px;
      transition: color .2s ease, border-color .2s ease;
    }

    .contact a:hover {
      color: var(--gold-light);
      border-color: var(--gold-light);
    }

    footer {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      color: #4a463d;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1 style="margin:0;font-size:0;line-height:0;">
      <img class="logo" src="assets/Logo.png" alt="Old Mine Labs" />
    </h1>

    <p class="tagline">
      We&rsquo;re an app studio. We <strong>design and build apps</strong> &mdash;
      the kind that feel good to use and are made to last.
    </p>

    <p class="contact">
      <a href="mailto:contact@old-mine-labs.com">contact@old-mine-labs.com</a>
    </p>
  </main>

  <footer>&copy; Old Mine Labs</footer>
</body>
</html>
